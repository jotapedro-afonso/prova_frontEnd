<!DOCTYPE html>

<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal do Candidato ENEM</title>
    <link rel="icon" type="image/png" href="enem.png/inep.png">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>

        <h1>Inscrição da Prova - ENEM</h1>

    </header>

    <main>

        <section class="card">

            <h2>Preenchimento de informações para inscrição</h2>

            <form id="registerForm">

                <select id="lingua">

                    <option value="">Escolha de lingua estrangeira:</option>
                    
                    <option>Inglês</option>
                    
                    <option>Espanhol</option>
                    
                    </select>

                    <select>

                        <option>Estado</option>
                        
                        <option>SP</option>
                        
                        <option>RJ</option>
                        
                        </select>
                        
                        
                        <select>
                        
                        <option>Cidade</option>

                        <option>Serra Negra</option>
 
                        <option>Monte alegre</option>
 
                        <option>São Paulo</option>
                        
                        <option>Rio de Janeiro</option>
                        
                        </select>
                        
                        
                        <p>Atendimento especializado?</p>
                        
                        
                        <select id="especial">
                        
                        <option value="nao">Não</option>
                        
                        <option value="sim">Sim</option>
                        
                        </select>

                        <div id="campo" style="display:none">


                            <input 
                            id="necessidade"
                            placeholder="Informe sua necessidade">
                            
                            </div>                
            
                            <button type="button" id="btnconfirm">
                            
                            Confirmar Inscrição
                            
                            </button>
                                
                            <p id="msg"></p>
                        
                            </form>

              
             

            </form>

        </section>

    </main>

    <footer>

        <p>
            © 2026 Sistema de Inscrição ENEM - Todos direitos reservados  João Pedro Afonso
        </p>

    </footer>

    <script src="index.js"></script>

</body>

</html>
